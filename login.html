<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLW | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card img { height: 70px; margin-bottom: 20px; }
        .login-card h2 { margin: 0 0 5px; color: #0f172a; font-size: 1.5rem; }
        .login-card p { margin: 0 0 30px; color: #64748b; font-size: 0.9rem; }
        
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group span {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .input-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 14px 14px 45px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: #2563eb; }
        
        .btn-login {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #1d4ed8; }
        
        #error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="images/rail_logo2.png" alt="Indian Railways">
        <h2>IT Admin Console</h2>
        <p>Enter your credentials to continue</p>

        <form id="loginForm">
            <div class="input-group">
                <span class="material-symbols-outlined">person</span>
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <span class="material-symbols-outlined">lock</span>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">Authenticate Gateway</button>
            <div id="error-msg">Invalid username or password.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.btn-login');
            btn.textContent = "Authenticating...";
            btn.disabled = true;
            
            // We will wire this up to FastAPI in the next step!
            setTimeout(() => {
                alert("This will connect to the SQLite DB next!");
                btn.textContent = "Authenticate Gateway";
                btn.disabled = false;
            }, 1000);
        });
    </script>
</body>
</html>
