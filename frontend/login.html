<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLW | Secure Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        /* --- Cinematic Background --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Deep industrial radial gradient */
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            overflow: hidden;
        }

        /* Ambient light flares */
        .ambient-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }
        .light-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: rgba(37, 99, 235, 0.3); }
        .light-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: rgba(250, 204, 21, 0.15); }

        /* --- Frosted Glass Vault Card --- */
        .login-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- Branding --- */
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-container img {
            width: 80px;
            background: white;
            padding: 4px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .login-card h2 {
            margin: 0 0 5px 0;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .login-card p {
            margin: 0 0 35px 0;
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        /* --- Premium Inputs --- */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group .material-symbols-outlined {
            position: absolute;
            top: 50%;
            left: 16px;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .input-group input::placeholder {
            color: #64748b;
        }

        /* The Gold Focus Snap */
        .input-group input:focus {
            border-color: #facc15;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.15);
        }
        .input-group input:focus + .material-symbols-outlined {
            color: #facc15; /* Icon turns gold on focus */
        }

        /* --- The Action Button --- */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: #facc15;
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
        }

        .btn-login:hover {
            background: #eab308;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(250, 204, 21, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* --- Error Message --- */
        .error-msg {
            display: none;
            margin-top: 20px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="../assets/images//rail_logo2.png" alt="Indian Railways">
        </div>
        <h2>IT Admin Console</h2>
        <p>Restricted Access</p>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Gateway ID (Username)" required>
                <span class="material-symbols-outlined">person</span>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Passcode" required>
                <span class="material-symbols-outlined">lock</span>
            </div>

            <button type="submit" class="btn-login">
                Authenticate Session <span class="material-symbols-outlined" style="font-size: 1.2rem;">login</span>
            </button>
            
            <div id="error-msg" class="error-msg"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.btn-login');
            const errorMsg = document.getElementById('error-msg');
            
            btn.innerHTML = `<span class="material-symbols-outlined" style="animation: spin 1s linear infinite;">autorenew</span> Authenticating...`;
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const API_URL = isLocal ? 'http://127.0.0.1:8000/api/login' : 'https://blw-secure-api.onrender.com/api/login';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('blw_admin_token', data.access_token);
                    window.location.href = 'admin.html'; 
                } else {
                    errorMsg.textContent = "Access Denied: Invalid credentials.";
                    errorMsg.style.display = 'block';
                    btn.innerHTML = `Authenticate Session <span class="material-symbols-outlined" style="font-size: 1.2rem;">login</span>`;
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.textContent = "Gateway Offline: Cannot connect to security server.";
                errorMsg.style.display = 'block';
                btn.innerHTML = `Authenticate Session <span class="material-symbols-outlined" style="font-size: 1.2rem;">login</span>`;
                btn.disabled = false;
            }
        });

        // Add a quick spin animation for the loading state
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
